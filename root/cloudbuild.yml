#  args:
#    - -c
#    - |
#      terraform apply -auto-approve tfplan
#  env:
#    - "TF_VAR_project_id=$PROJECT_ID"
#    - "TF_VAR_region=${_REGION}"
#    - "TF_VAR_deploy_sa_email=$TF_VAR_deploy_sa_email"
#    - "TF_VAR_shared_secret=$TF_VAR_shared_secret"

# Secrets injection from Secret Manager
availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/GCP_SA_EMAIL/versions/latest
    env: "TF_VAR_deploy_sa_email"
  - versionName: projects/$PROJECT_ID/secrets/vpn-shared-secret/versions/latest
    env: "TF_VAR_shared_secret"

# Substitutions for environment values (only custom keys starting with _)
substitutions:
  _REGION: "us-central1"
  _TF_STATE_BUCKET: "tfstate-terraform-488518"
  _TF_STATE_PREFIX: "network/dev"

# Logging option
options:
  logging: CLOUD_LOGGING_ONLY