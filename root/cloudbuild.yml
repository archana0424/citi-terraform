# Secrets injection from Secret Manager
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GCP_SA_EMAIL/versions/latest
      env: TF_VAR_deploy_sa_email
    - versionName: projects/$PROJECT_ID/secrets/vpn-shared-secret/versions/latest
      env: TF_VAR_shared_secret


# Substitutions (must start with _)
substitutions:
  _REGION: "us-central1"
  _TF_STATE_BUCKET: "tfstate-terraform-488518"
  _TF_STATE_PREFIX: "network/dev"


# Logging option
options:
  logging: CLOUD_LOGGING_ONLY