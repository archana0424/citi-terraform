# Cloud Build pipeline for Terraform (init, validate, plan)

steps:

# Step 1: Pre-check (GCP connection, auth)
- name: gcr.io/google.com/cloudsdktool/cloud-sdk
  id: pre-check
  entrypoint: bash
  secretEnv:
    - TF_VAR_deploy_sa_email
  args:
    - -c
    - |
      set -e
      echo "Active project: $(gcloud config get-value project)"
      echo "ADC accounts:"
      gcloud auth list

      echo "gcloud version:"
      gcloud --version

      echo "Impersonation target: $$TF_VAR_deploy_sa_email"

      gcloud auth print-access-token \
      --impersonate-service-account="$$TF_VAR_deploy_sa_email" >/dev/null \
      && echo "Impersonation OK" \
      || echo "Impersonation FAILED"


# Step 2: Terraform Init + Validate
- name: hashicorp/terraform:1.6.6
  id: terraform-init-validate
  entrypoint: sh
  secretEnv:
    - TF_VAR_deploy_sa_email
    - TF_VAR_shared_secret
  env:
    - TF_VAR_project_id=$PROJECT_ID
    - TF_VAR_region=$_REGION
  args:
    - -c
    - |
      terraform init \
        -backend-config="bucket=$_TF_STATE_BUCKET" \
        -backend-config="prefix=$_TF_STATE_PREFIX"

      terraform fmt -check
      terraform validate


# Step 3: Terraform Plan
- name: hashicorp/terraform:1.6.6
  id: terraform-plan
  entrypoint: sh
  secretEnv:
    - TF_VAR_deploy_sa_email
    - TF_VAR_shared_secret
  env:
    - TF_VAR_project_id=$PROJECT_ID
    - TF_VAR_region=$_REGION
  args:
    - -c
    - |
      terraform plan -out=tfplan


# Step 4: Terraform Apply (optional)
#- name: hashicorp/terraform:1.6.6
